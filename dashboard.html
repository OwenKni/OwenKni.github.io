<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartSort Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Orbitron:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .header-left img.school-logo {
        width: 50px;
        height: 50px;
      }
      .header-left h1 {
        margin: 0;
        font-size: 22px;
      }
      .icon-container {
        display: flex;
        gap: 10px;
      }
      .icon-container img {
        width: 35px;
        height: 35px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <img src="/images/cs2.png" alt="School Logo" class="school-logo"/>
        <h1>SmartSort Dashboard</h1>
      </div>
      <div class="icon-container">
        <a href="main.html"><img src="/images/home2.png" alt="Home"/></a>
        <a href="dashboard.html"><img src="/images/dashb.png" alt="Dashboard"/></a>
        <a href="logbook.html"><img src="/images/logbook.png" alt="Logbook"/></a>
      </div>
    </header>

    <section class="dashboard-section">
      <h2>Live Paper Count</h2>
      <div class="dashboard">
        <div class="counter green-box">
          <h3 class="green">Green Papers</h3>
          <p id="green-count">0</p>
        </div>
        <div class="counter red-box">
          <h3 class="red">Red Papers</h3>
          <p id="red-count">0</p>
        </div>
      </div>
      <a href="logbook.html" class="trackbtn">Track Papers</a>
    </section>

    <script>
      const apiKey = "Y9GW02L7BBD18516";
      const channelId = "3289768";

      async function fetchCounts() {
        try {
          const res = await fetch(`https://api.thingspeak.com/channels/${channelId}/feeds.json?api_key=${apiKey}&results=100`);
          const data = await res.json();
          const feeds = data.feeds;

          let green = 0;
          let red = 0;

          feeds.forEach(feed => {
            if(feed.field1=="1") green++;
            if(feed.field2=="1") red++;
          });

          document.getElementById("green-count").textContent = green;
          document.getElementById("red-count").textContent = red;
        } catch(err) { console.error(err); }
      }

      fetchCounts();
      setInterval(fetchCounts, 5000);
    </script>
  </body>
</html>
