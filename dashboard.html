<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartSort Dashboard</title>
<link rel="stylesheet" href="styles.css" />

<style>
  header { display: flex; align-items: center; gap: 20px; }
  .icon-container { display: flex; flex-direction: column; gap: 10px; margin-left: auto; }
  .icon-container img { width: 40px; height: 40px; }
  .dashboard-section { margin: 30px; }
  .dashboard { display: flex; gap: 20px; margin-bottom: 20px; }
  .counter { padding: 15px; border-radius: 10px; text-align: center; font-family: 'Orbitron', sans-serif; flex: 1; }
  .green-box { background-color: #d4f4dd; }
  .red-box { background-color: #f4d4d4; }
  #reset-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background-color: #5555ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 15px;
  }
  #reset-btn:hover { background-color: #3333cc; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <img src="/images/cs2.png" alt="School Logo" class="school-logo" />
  <div>
    <h1 class="logo-text">SmartSort</h1>
    <h2>Dashboard</h2>
  </div>

  <div class="icon-container">
    <a href="main.html"><img src="/images/home2.png" alt="Home" /></a>
    <a href="dashboard.html"><img src="/images/dashb.png" alt="Dashboard" /></a>
    <a href="logbook.html"><img src="/images/logbook.png" alt="Logbook" /></a>
  </div>
</header>

<!-- DASHBOARD SECTION -->
<section class="dashboard-section">
  <h2>Live Paper Count</h2>

  <div class="dashboard">
    <div class="counter green-box">
      <h3 class="green">Green Papers</h3>
      <p id="green-count">0</p>
    </div>
    <div class="counter red-box">
      <h3 class="red">Red Papers</h3>
      <p id="red-count">0</p>
    </div>
  </div>

  <!-- RESET BUTTON -->
  <button id="reset-btn">Reset Dashboard</button>

  <a href="logbook.html" class="trackbtn">Track Papers</a>
</section>

<script>
  const apiKey = "Y9GW02L7BBD18516";
  const channelId = "3289768";

  async function fetchCounts() {
    try {
      const res = await fetch(`https://api.thingspeak.com/channels/${channelId}/feeds.json?api_key=${apiKey}&results=100`);
      const data = await res.json();
      const feeds = data.feeds;

      let green = 0;
      let red = 0;

      feeds.forEach(feed => {
        if(feed.field1 == "1") green++;
        if(feed.field2 == "1") red++;
      });

      document.getElementById("green-count").textContent = green;
      document.getElementById("red-count").textContent = red;
    } catch(e) { console.error(e); }
  }

  fetchCounts();
  setInterval(fetchCounts, 5000);

  // RESET BUTTON: only clears dashboard numbers locally
  document.getElementById("reset-btn").addEventListener("click", () => {
    if(confirm("Reset dashboard counts to zero? This will not delete logbook history.")) {
      document.getElementById("green-count").textContent = 0;
      document.getElementById("red-count").textContent = 0;
    }
  });
</script>

</body>
</html>
