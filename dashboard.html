<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartSort Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Orbitron:wght@600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- PARTICLE BACKGROUND -->
    <div class="background-animation">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
    </div>

    <!-- HEADER -->
    <header>
      <img src="/images/cs2.png" alt="School Logo" class="school-logo" />
      <h1 class="logo-text">SmartSort</h1>
      <h1>Dashboard</h1>

      <div class="icon-container">
        <a href="main.html" class="home-icon">
          <img src="/images/home2.png" alt="Home Icon" />
        </a>
        <a href="dashboard.html" class="dashboard-icon">
          <img src="/images/dashb.png" alt="Dashboard Icon" />
        </a>
        <a href="logbook.html" class="logbook-icon">
          <img src="/images/logbook.png" alt="Logbook Icon" />
        </a>
      </div>
    </header>

    <!-- DASHBOARD SECTION -->
    <section class="dashboard-section">
      <h2>Live Paper Count</h2>

      <div class="dashboard">
        <!-- GREEN PAPERS -->
        <div class="counter green-box">
          <h3 class="green">Green Papers</h3>
          <p id="green-count">0</p>
        </div>

        <!-- RED PAPERS -->
        <div class="counter red-box">
          <h3 class="red">Red Papers</h3>
          <p id="red-count">0</p>
        </div>
      </div>

      <!-- RESET BUTTON -->
      <button id="resetButton" class="trackbtn" style="margin-top:15px; width:100%;">Reset Counters</button>

      <a href="logbook.html" class="trackbtn" style="margin-top:10px;">Track Papers</a>
    </section>

    <!-- DASHBOARD SCRIPT -->
    <script>
      const apiKey = "Y9GW02L7BBD18516";
      const channelId = "3289768";

      // Dashboard counters
      let dashboardGreen = 0;
      let dashboardRed = 0;

      // Track the last ThingSpeak feed processed
      let lastFeedId = 0;

      // Reset button
      document.getElementById("resetButton").addEventListener("click", function() {
        dashboardGreen = 0;
        dashboardRed = 0;
        lastFeedId = 0; // ignore all previous feeds
        document.getElementById("green-count").textContent = "0";
        document.getElementById("red-count").textContent = "0";
      });

      // Fetch only the latest feed from ThingSpeak
      async function fetchCounts() {
        try {
          const response = await fetch(
            `https://api.thingspeak.com/channels/${channelId}/feeds.json?api_key=${apiKey}&results=1`
          );
          const data = await response.json();
          const feed = data.feeds[0];

          if (!feed) return;

          // Only add if feed is new
          if (feed.entry_id > lastFeedId) {
            if (feed.field1 == "1") dashboardGreen++;
            if (feed.field2 == "1") dashboardRed++;

            lastFeedId = feed.entry_id;

            document.getElementById("green-count").textContent = dashboardGreen;
            document.getElementById("red-count").textContent = dashboardRed;
          }
        } catch (err) {
          console.error("Error fetching data:", err);
        }
      }

      // Initial fetch & interval
      fetchCounts();
      setInterval(fetchCounts, 2000); // fetch every 2s
    </script>
  </body>
</html>
