<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartSort Logbook</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="background-animation">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
    </div>
    <header>
      <img src="/images/cs2.png" alt="School Logo" class="school-logo" />
      <h1 class="logo-text">SmartSort</h1>
      <h1>Logbook</h1>

      <div class="icon-container">
        <a href="index.html" class="home-icon">
          <img src="/images/home2.png" alt="Home" />
        </a>
        <a href="dashboard.html" class="dashboard-icon">
          <img src="/images/dashb.png" alt="Dashboard" />
        </a>
        <a href="logbook.html" class="logbook-icon">
          <img src="/images/logbook.png" alt="Logbook" />
        </a>
      </div>
    </header>

    <section class="dashboard-section">
      <h2>Paper Drop History</h2>
      <table class="log-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Paper Type</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </section>

    <script>
      const apiKey = "Y9GW02L7BBD18516";
      const channelId = "3289768";

      async function loadLogbook() {
        try {
          const response = await fetch(
            `https://api.thingspeak.com/channels/${channelId}/feeds.json?api_key=${apiKey}&results=100`,
          );
          const data = await response.json();
          const feeds = data.feeds.reverse();

          const logBody = document.getElementById("log-body");
          logBody.innerHTML = "";

          feeds.forEach((feed) => {
            const time = new Date(feed.created_at).toLocaleString();

            // Check field1 (GREEN)
            if (feed.field1 == "0" || feed.field1 == "1") {
              const tr = document.createElement("tr");
              tr.innerHTML = `<td>${time}</td>
                        <td style="color:green; font-weight:bold;">GREEN</td>`;
              logBody.appendChild(tr);
            }

            // Check field2 (RED)
            if (feed.field2 == "0" || feed.field2 == "1") {
              const tr = document.createElement("tr");
              tr.innerHTML = `<td>${time}</td>
                        <td style="color:red; font-weight:bold;">RED</td>`;
              logBody.appendChild(tr);
            }
          });
        } catch (error) {
          console.error("Error loading logbook:", error);
        }
      }

      loadLogbook();
      setInterval(loadLogbook, 5000);
    </script>
  </body>
</html>
