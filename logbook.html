<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartSort Logbook</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- Background particles -->
    <div class="background-animation">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
    </div>

    <!-- Header -->
    <header>
      <img src="/images/cs2.png" alt="School Logo" class="school-logo" />
      <h1 class="logo-text">SmartSort</h1>
      <h1>Logbook</h1>

      <div class="icon-container">
        <a href="main.html" class="home-icon">
          <img src="/images/home2.png" alt="Home" />
        </a>
        <a href="dashboard.html" class="dashboard-icon">
          <img src="/images/dashb.png" alt="Dashboard" />
        </a>
        <a href="logbook.html" class="logbook-icon">
          <img src="/images/logbook.png" alt="Logbook" />
        </a>
      </div>
    </header>

    <!-- Logbook section -->
    <section class="dashboard-section">
      <h2>Paper Drop History</h2>

      <!-- Search Bar -->
      <input
        type="date"
        id="searchDate"
        class="trackbtn"
        style="width: 300px; margin-bottom: 40px; padding: 5px;"
      />

      <table class="log-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Paper Type</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </section>

    <!-- Logbook Script -->
    <script>
      const apiKey = "Y9GW02L7BBD18516";
      const channelId = "3289768";

      let allLogs = []; // store all feeds locally

      async function loadLogbook() {
        try {
          const response = await fetch(
            `https://api.thingspeak.com/channels/${channelId}/feeds.json?api_key=${apiKey}&results=100`
          );
          const data = await response.json();
          allLogs = data.feeds.reverse(); // newest first
          displayLogs();
        } catch (error) {
          console.error("Error loading logbook:", error);
        }
      }

      // Display logs (filtered by search if any)
      function displayLogs() {
        const logBody = document.getElementById("log-body");
        const searchDate = document.getElementById("searchDate").value;
        logBody.innerHTML = "";

        allLogs.forEach(feed => {
          const feedTime = new Date(feed.created_at);
          const feedDateStr = feedTime.toISOString().split("T")[0]; // YYYY-MM-DD

          if (searchDate && feedDateStr !== searchDate) return; // filter by date

          if (feed.field1 == "1") {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${feedTime.toLocaleString()}</td>
                            <td style="color:green; font-weight:bold;">GREEN</td>`;
            logBody.appendChild(tr);
          }

          if (feed.field2 == "1") {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${feedTime.toLocaleString()}</td>
                            <td style="color:red; font-weight:bold;">RED</td>`;
            logBody.appendChild(tr);
          }
        });
      }

      // Event listener for date search
      document.getElementById("searchDate").addEventListener("change", displayLogs);

      // Initial load & refresh every 5s
      loadLogbook();
      setInterval(loadLogbook, 5000);
    </script>
  </body>
</html>
