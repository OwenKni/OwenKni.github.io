<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartSort Login</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap"
    />
    <style>
      /* ===== BODY & BACKGROUND ===== */
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        background: url("/images/weeb.png") no-repeat center center;
        background-size: cover;
        position: relative;
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Particle background placeholder */
      .background-animation {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: -1;
        pointer-events: none;
        overflow: hidden;
      }

      /* ===== LOGIN BOX ===== */
      .login-box {
        position: relative;
        z-index: 1;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 50px 40px;
        text-align: center;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);
        width: 350px;
      }

      .login-box h2 {
        font-family: "Orbitron", sans-serif;
        margin-bottom: 30px;
        color: #064d00;
      }

      /* ===== INPUT FIELDS ===== */
      .login-box input[type="password"],
      .login-box input[type="text"] {
        width: 100%;
        padding: 15px;
        font-size: 16px; /* keep placeholder same size */
        border-radius: 12px;
        border: 2px solid #064d00;
        margin-bottom: 25px; /* wider spacing */
        outline: none;
        background: rgba(255, 255, 255, 0.1);
        color: #064d00;
      }

      /* Placeholder style stays consistent */
      .login-box input::placeholder {
        font-size: 16px;
        color: rgba(6, 77, 0, 0.6);
        font-weight: normal;
      }

      /* ===== SHOW PASSWORD TOGGLE ===== */
      .login-box label {
        font-size: 14px;
        color: #064d00;
        display: block;
        margin-bottom: 30px; /* wider space before button */
        cursor: pointer;
        user-select: none;
      }

      .login-box input[type="checkbox"] {
        margin-right: 8px;
        transform: scale(1.2);
        vertical-align: middle;
      }

      /* ===== LOGIN BUTTON ===== */
      .login-box button {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #4caf50, #1de9b6);
        color: white;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        transition:
          0.3s ease,
          transform 0.3s ease;
      }

      .login-box button:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
      }

      /* ===== ERROR MESSAGE ===== */
      .error-msg {
        color: #f44336;
        font-weight: bold;
        margin-top: 15px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="background-animation">
      <!-- Optional: floating particles here -->
    </div>

    <div class="login-box">
      <h2>SmartSort Login</h2>
      <input type="password" id="password" placeholder="Enter Password" />
      <label> <input type="checkbox" id="showPassword" /> Show Password </label>
      <button id="loginBtn">Login</button>
      <div class="error-msg" id="errorMsg">Incorrect password!</div>
    </div>

    <script>
      const correctPassword = "JRIEL SO SARAP";
      const loginBtn = document.getElementById("loginBtn");
      const passwordInput = document.getElementById("password");
      const showPassword = document.getElementById("showPassword");
      const errorMsg = document.getElementById("errorMsg");

      // Toggle show/hide password (only changes type)
      showPassword.addEventListener("change", () => {
        passwordInput.type = showPassword.checked ? "text" : "password";
      });

      // Login button click
      loginBtn.addEventListener("click", () => {
        if (passwordInput.value === correctPassword) {
          window.location.href = "main.html";
        } else {
          errorMsg.style.display = "block";
        }
      });

      // Press Enter key to login
      passwordInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") loginBtn.click();
      });
    </script>
  </body>
</html>
